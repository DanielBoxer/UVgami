name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Which part of the version to increment"
        type: choice
        options:
          - major
          - minor
          - patch
        default: "patch"
        required: true

      use_old_engine:
        description: "Upload previous engine"
        type: boolean
        default: "true"
        required: true

      version:
        description: "Override version increment"
        required: false

env:
  ADDON_NAME: "UVgami"
  INCLUDED_FILES: "src LICENSE __init__.py"
  ENGINE_PREFIX: uvgami-engine
  BUNDLED_NAME: "UVgami-bundled-with-engines"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # this needs to be before engine download
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get Next Version
        id: get_version
        uses: danielboxer/next-version-action@v1
        with:
          increment: ${{ inputs.increment }}
          version: ${{ inputs.version }}
          use_v_prefix: true

      # 1. get engine zips from previous release
      - name: Download engines
        id: download_engines
        if: ${{ inputs.use_old_engine }}
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: "${{ env.ENGINE_PREFIX }}-*.zip"
        continue-on-error: true

      # 2. package add-on
      - name: Move to nested folder
        run: |
          mkdir $ADDON_NAME
          mv $INCLUDED_FILES $ADDON_NAME

      - name: Zip folder
        run: zip -r ${ADDON_NAME}.zip $ADDON_NAME

      # 3. create bundled variant with engines
      - name: Create bundled addon with engines
        id: bundled
        if: ${{ inputs.use_old_engine }}
        run: |
          if ! ls ${ENGINE_PREFIX}-*.zip 1>/dev/null 2>&1; then
            echo "has_engines=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_engines=true" >> $GITHUB_OUTPUT
          bash .github/scripts/bundle-engines.sh $ADDON_NAME $ENGINE_PREFIX
          zip -r ${BUNDLED_NAME}.zip $ADDON_NAME

      # 4. create new release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.new_version }}
          files: ${{ env.ADDON_NAME }}.zip

      # 5. upload bundled addon
      - name: Upload bundled addon
        if: ${{ steps.bundled.outputs.has_engines == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.new_version }}
          files: ${{ env.BUNDLED_NAME }}.zip

      # 6. upload engine if not new
      - name: Upload engine
        if: ${{ inputs.use_old_engine && fromJSON(steps.download_engines.outputs.downloaded_files || '[]')[0] != null }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.new_version }}
          files: "${{ env.ENGINE_PREFIX }}-*.zip"
