name: Engine build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - engine/VERSION

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  PACKAGE_PREFIX: uvgami-engine
  ADDON_NAME: "UVgami"
  BUNDLED_NAME: "UVgami-bundled-with-engines"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            pkg_name: linux
          - os: windows-latest
            pkg_name: windows
          - os: macos-26-intel
            pkg_name: macos-x64
          - os: macos-26-arm64
            pkg_name: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read engine version
        id: engine_version
        shell: bash
        run: |
          VERSION=$(cat engine/VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Ubuntu dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xorg-dev libglu1-mesa-dev

      - name: Install dependencies
        run: |
          cmake -E make_directory ${{ github.workspace }}/build

      - name: Set package name
        shell: bash
        run: |
          PACKAGE_NAME="${PACKAGE_PREFIX}-${{ steps.engine_version.outputs.version }}-${{ matrix.pkg_name }}"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Build and package engine
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake $GITHUB_WORKSPACE/engine -Wno-dev -DBUILD_SHARED_LIBS=OFF \
            -DCPACK_GENERATOR:STRING=ZIP \
            -DCPACK_PACKAGE_FILE_NAME:STRING=$PACKAGE_NAME

          cmake --build . --config $BUILD_TYPE --target package

      - name: Get latest tag
        id: previous_tag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Upload binaries to latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.previous_tag.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" "build/${PACKAGE_NAME}.zip" --clobber

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.pkg_name }}
          path: build/${{ env.PACKAGE_NAME }}.zip

  rebuild-bundled:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get latest tag
        id: previous_tag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Download all engine artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: engine-*
          merge-multiple: true

      # download the existing addon zip from the release
      - name: Download addon zip
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ steps.previous_tag.outputs.tag }}
          fileName: "${{ env.ADDON_NAME }}.zip"

      - name: Create bundled addon with engines
        run: |
          unzip -o ${ADDON_NAME}.zip
          bash .github/scripts/bundle-engines.sh $ADDON_NAME $PACKAGE_PREFIX
          zip -r ${BUNDLED_NAME}.zip $ADDON_NAME

      # remove old bundled zip and upload new one
      - name: Upload bundled addon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.previous_tag.outputs.tag }}
        run: gh release upload "$TAG" "${BUNDLED_NAME}.zip" --clobber
