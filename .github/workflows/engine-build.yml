name: Engine build

on: workflow_dispatch

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  PACKAGE_PREFIX: uvgami-engine
  ENGINE_VERSION_MAJOR: 1
  ENGINE_VERSION_MINOR: 1
  ENGINE_VERSION_PATCH: 2
  ADDON_NAME: "UVgami"
  BUNDLED_NAME: "UVgami-bundled-with-engines"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            pkg_name: linux
          - os: windows-latest
            pkg_name: windows
          - os: macos-26-intel
            pkg_name: macos-x64
          - os: macos-26-arm64
            pkg_name: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Ubuntu dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xorg-dev libglu1-mesa-dev

      - name: Install dependencies
        run: |
          cmake -E make_directory ${{ github.workspace }}/build

      - name: Set package name
        shell: bash
        run: |
          PACKAGE_NAME="${PACKAGE_PREFIX}-${ENGINE_VERSION_MAJOR}.${ENGINE_VERSION_MINOR}.${ENGINE_VERSION_PATCH}-${{ matrix.pkg_name }}"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Build and package engine
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: |
          cmake $GITHUB_WORKSPACE/engine -Wno-dev -DBUILD_SHARED_LIBS=OFF \
            -DCPACK_GENERATOR:STRING=ZIP \
            -DCPACK_PACKAGE_FILE_NAME:STRING=$PACKAGE_NAME \
            -DUVGAMI_VERSION_MAJOR=${ENGINE_VERSION_MAJOR} \
            -DUVGAMI_VERSION_MINOR=${ENGINE_VERSION_MINOR} \
            -DUVGAMI_VERSION_BUILD=${ENGINE_VERSION_PATCH}

          cmake --build . --config $BUILD_TYPE --target package

      - name: Get latest tag
        id: previous_tag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Upload binaries to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.previous_tag.outputs.tag }}
          files: build/${{ env.PACKAGE_NAME }}.zip

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.pkg_name }}
          path: build/${{ env.PACKAGE_NAME }}.zip

  rebuild-bundled:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get latest tag
        id: previous_tag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Download all engine artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: engine-*
          merge-multiple: true

      # download the existing addon zip from the release
      - name: Download addon zip
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ steps.previous_tag.outputs.tag }}
          fileName: "${{ env.ADDON_NAME }}.zip"

      - name: Create bundled addon with engines
        run: |
          unzip -o ${ADDON_NAME}.zip
          bash .github/scripts/bundle-engines.sh $ADDON_NAME $PACKAGE_PREFIX
          zip -r ${BUNDLED_NAME}.zip $ADDON_NAME

      # remove old bundled zip and upload new one
      - name: Upload bundled addon
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.previous_tag.outputs.tag }}
          files: ${{ env.BUNDLED_NAME }}.zip
